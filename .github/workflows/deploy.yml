name: PatoCup CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Permisos necesarios para que GitHub se loguee en Azure sin contraseñas (OIDC)
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Push a Docker Hub & Deploy to Azure
    runs-on: ubuntu-latest

    # Solo corre si el push es a la rama main
    if: github.ref == 'refs/heads/main'

    env:
      APP_VERSION: 1.0.0

    steps:
    - name: Descargar código (Checkout)
      uses: actions/checkout@v3

    # DOCKER HUB LOGIN
    - name: Login en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # BUILD Y PUSH EN DOCKER HUB
    - name: Build & Push Backend (.NET)
      run: |
        docker build -t "${{ secrets.DOCKER_USERNAME }}/pato-back:latest" -t "${{ secrets.DOCKER_USERNAME }}/pato-back:${{ env.APP_VERSION }}" ./api
        docker push "${{ secrets.DOCKER_USERNAME }}/pato-back:latest"
        docker push "${{ secrets.DOCKER_USERNAME }}/pato-back:${{ env.APP_VERSION }}"

    - name: Build & Push Frontend (Angular)
      run: |
        docker build -t "${{ secrets.DOCKER_USERNAME }}/pato-front:latest" -t "${{ secrets.DOCKER_USERNAME }}/pato-front:${{ env.APP_VERSION }}" -f client/Dockerfile .
        docker push "${{ secrets.DOCKER_USERNAME }}/pato-front:latest"
        docker push "${{ secrets.DOCKER_USERNAME }}/pato-front:${{ env.APP_VERSION }}"

    # AZURE LOGIN
    - name: Login to Azure
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EE23E2F228BB46268E4C520D4D2278D1 }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F1806B67CFBF4B48A20131F5FB80ABB2 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_275560C3E08341C187A5EB13FCBECB50 }}

    # DEPLOYMENT TO AZURE
    - name: Deploy Backend to Azure
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'api-patocup-backend' 
        images: '${{ secrets.DOCKER_USERNAME }}/pato-back:latest'

    - name: Deploy Frontend to Azure
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'app-patocup-frontend'
        images: '${{ secrets.DOCKER_USERNAME }}/pato-front:latest'